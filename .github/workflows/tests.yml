name: Tests

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -mod=mod ./...

      - name: Build container image
        run: docker build -t smtp-to-max-relay:ci .
