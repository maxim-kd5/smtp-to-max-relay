name: Tests

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -mod=mod ./...

      - name: Resolve build number
        id: build_meta
        run: echo "build_number=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build container image
        run: docker build --build-arg BUILD_NUMBER=${{ steps.build_meta.outputs.build_number }} -t smtp-to-max-relay:ci .

      - name: Save container image tar
        run: docker save -o smtp-to-max-relay-image.tar smtp-to-max-relay:ci

      - name: Upload container image artifact
        uses: actions/upload-artifact@v4
        with:
          name: smtp-to-max-relay-image
          path: smtp-to-max-relay-image.tar
          if-no-files-found: error

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        if: github.event_name != 'pull_request'
        run: |
          IMAGE="ghcr.io/${{ github.repository }}:sha-${{ github.sha }}"
          docker tag smtp-to-max-relay:ci "$IMAGE"
          docker push "$IMAGE"

          if [ "${{ github.ref_name }}" = "main" ]; then
            docker tag smtp-to-max-relay:ci "ghcr.io/${{ github.repository }}:latest"
            docker push "ghcr.io/${{ github.repository }}:latest"
          fi
