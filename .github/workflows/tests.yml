name: Tests

on:
  push:
    branches:
      - '**'
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  packages: write

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -mod=mod ./...

      - name: Run race detector
        run: go test -mod=mod -race ./...

      - name: Resolve build number
        id: build_meta
        run: echo "build_number=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build container image
        run: docker build --build-arg BUILD_NUMBER=${{ steps.build_meta.outputs.build_number }} -t smtp-to-max-relay:ci .

      - name: Build dev container image
        run: |
          docker build \
            --build-arg BUILD_NUMBER=${{ steps.build_meta.outputs.build_number }} \
            --build-arg BUILD_SUFFIX=dev \
            -t smtp-to-max-relay:dev .

      - name: Save container image tar
        run: docker save -o smtp-to-max-relay-image.tar smtp-to-max-relay:ci

      - name: Upload container image artifact
        uses: actions/upload-artifact@v4
        with:
          name: smtp-to-max-relay-image
          path: smtp-to-max-relay-image.tar
          if-no-files-found: error

      - name: Login to GHCR
        if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false)
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            IMAGE="ghcr.io/${{ github.repository }}:sha-${{ github.sha }}"
            docker tag smtp-to-max-relay:ci "$IMAGE"
            docker push "$IMAGE"
          fi

          docker build \
            --build-arg BUILD_NUMBER=${{ steps.build_meta.outputs.build_number }} \
            --build-arg BUILD_SUFFIX=dev \
            -t "ghcr.io/${{ github.repository }}:dev" .
          docker push "ghcr.io/${{ github.repository }}:dev"

          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_name }}" = "main" ]; then
            docker tag smtp-to-max-relay:ci "ghcr.io/${{ github.repository }}:latest"
            docker push "ghcr.io/${{ github.repository }}:latest"
          fi
