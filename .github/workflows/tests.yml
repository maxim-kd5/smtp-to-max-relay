name: Tests

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -mod=mod ./...

      - name: Build container image
        run: docker build -t smtp-to-max-relay:ci .

      - name: Save container image tar
        run: docker save -o smtp-to-max-relay-image.tar smtp-to-max-relay:ci

      - name: Upload container image artifact
        uses: actions/upload-artifact@v4
        with:
          name: smtp-to-max-relay-image
          path: smtp-to-max-relay-image.tar
          if-no-files-found: error
